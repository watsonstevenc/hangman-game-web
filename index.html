<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hangman</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Hangman</h1>

    <!-- Gallows SVG drawing -->
    <svg class="gallows" viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
      <!-- Static structure -->
      <line x1="20" y1="210" x2="180" y2="210" /> <!-- base -->
      <line x1="60" y1="210" x2="60" y2="20" />   <!-- pole -->
      <line x1="60" y1="20" x2="130" y2="20" />   <!-- top beam -->
      <line x1="130" y1="20" x2="130" y2="45" />  <!-- rope -->

      <!-- Body parts, shown progressively -->
      <circle id="head"      cx="130" cy="60" r="16" class="body-part hidden" />
      <line   id="body"      x1="130" y1="76" x2="130" y2="130" class="body-part hidden" />
      <line   id="left-arm"  x1="130" y1="90" x2="100" y2="115" class="body-part hidden" />
      <line   id="right-arm" x1="130" y1="90" x2="160" y2="115" class="body-part hidden" />
      <line   id="left-leg"  x1="130" y1="130" x2="100" y2="165" class="body-part hidden" />
      <line   id="right-leg" x1="130" y1="130" x2="160" y2="165" class="body-part hidden" />
    </svg>

    <!-- Wrong guess counter -->
    <p id="wrong-count" class="wrong-count">Wrong guesses: 0 / 6</p>

    <!-- Word display -->
    <div id="word-display" class="word-display"></div>

    <!-- Guessed letters -->
    <p id="guessed-letters" class="guessed-letters"></p>

    <!-- A–Z letter buttons -->
    <div id="letter-buttons" class="letter-buttons"></div>

    <!-- Result message -->
    <div id="result" class="result hidden"></div>

    <!-- Play again button -->
    <button id="play-again" class="play-again hidden" onclick="startGame()">Play Again</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
